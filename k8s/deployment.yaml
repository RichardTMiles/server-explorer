apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-explorer
  namespace: server-explorer
  labels:
    app.kubernetes.io/name: server-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: server-explorer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server-explorer
    spec:
      serviceAccountName: server-explorer
      containers:
        - name: server-explorer
          image: ghcr.io/richardtmiles/server-explorer:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: PROBES_ENABLED
              value: "true"
            - name: CLUSTER_EXPLORER_ENABLED
              value: "true"
            - name: GRAFANA_URL
              value: "http://rancher-monitoring-grafana.cattle-monitoring-system.svc"
            - name: PROMETHEUS_URL
              value: "http://rancher-monitoring-prometheus.cattle-monitoring-system.svc:9090"
            - name: FRAME_ANCESTORS
              value: "'self' https://spiders.assessorly.com https://spiders-staging.assessorly.com https://local.assessorly.com"
          readinessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
